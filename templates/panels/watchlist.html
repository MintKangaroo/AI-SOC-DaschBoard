    <!-- ════ IOC 워치리스트 패널 ════ -->
    <div id="panel-watchlist" class="panel-section d-none">
      <div class="panel-title">
        <i class="fa fa-binoculars me-2 text-purple"></i>IOC 워치리스트 — 능동 헌팅
        <span class="badge bg-dark ms-2" id="wl-total-badge">-</span>
        <button class="btn btn-xs btn-outline-cyan ms-auto" onclick="loadWatchlist()">
          <i class="fa fa-sync me-1"></i>새로고침
        </button>
      </div>

      <div class="card-panel mb-3" style="border-left:3px solid var(--purple); background:rgba(157,121,242,.06);">
        <div class="card-panel-header" style="border:none; padding-bottom:4px;">
          <i class="fa fa-lightbulb text-purple me-2"></i>이 패널은 어떻게 봐야 할까?
        </div>
        <div class="small" style="color:#e6edf3; line-height:1.7">
          아직 차단까진 아니지만 <strong>계속 지켜볼 지표(IP·도메인·해시)</strong>를 등록하는 능동 헌팅 목록입니다.
          등록한 IOC 가 이후 알림의 출발지/목적지로 <strong>등장하면 히트가 집계</strong>되고 실시간 알림이 뜹니다.
          SOAR 차단(사후 반응)과 달리, 의심스럽지만 확증 전인 지표를 미리 올려두고 추적하세요.
        </div>
      </div>

      <!-- 요약 + 추가 폼 -->
      <div class="row g-3 mb-3">
        <div class="col-lg-4">
          <div class="card-panel h-100">
            <div class="card-panel-header"><i class="fa fa-plus me-2 text-success"></i>IOC 추가</div>
            <div class="mb-2">
              <label class="form-label small text-muted mb-1">유형</label>
              <select id="wl-type" class="form-select form-select-sm bg-dark text-white border-secondary">
                <option value="ip">IP</option>
                <option value="domain">도메인</option>
                <option value="hash">해시</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted mb-1">값</label>
              <input type="text" id="wl-value" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="예: 185.220.101.45">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted mb-1">메모</label>
              <input type="text" id="wl-note" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="추적 사유(선택)">
            </div>
            <button class="btn btn-sm btn-cyan w-100" onclick="addWatchlist()"><i class="fa fa-plus me-1"></i>워치리스트에 추가</button>
            <div id="wl-add-msg" class="small mt-2"></div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="row g-2 h-100">
            <div class="col-4"><div class="card-panel text-center h-100 d-flex flex-column justify-content-center"><div class="fs-3 fw-bold text-purple" id="wl-count">-</div><div class="small text-muted">등록 IOC</div></div></div>
            <div class="col-4"><div class="card-panel text-center h-100 d-flex flex-column justify-content-center"><div class="fs-3 fw-bold text-danger" id="wl-hits">-</div><div class="small text-muted">누적 히트</div></div></div>
            <div class="col-4"><div class="card-panel text-center h-100 d-flex flex-column justify-content-center"><div class="fs-3 fw-bold text-warning" id="wl-active">-</div><div class="small text-muted">히트 발생 IOC</div></div></div>
          </div>
        </div>
      </div>

      <!-- IOC 목록 -->
      <div class="card-panel p-0">
        <table class="table table-dark table-hover table-sm mb-0 align-middle">
          <thead>
            <tr><th>유형</th><th>값</th><th>메모</th><th>등록자</th><th>등록일</th><th class="text-end">히트</th><th>최근 히트</th><th></th></tr>
          </thead>
          <tbody id="wl-tbody">
            <tr><td colspan="8" class="text-center text-muted py-4">등록된 IOC 가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
