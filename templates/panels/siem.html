    <div id="panel-siem" class="panel-section d-none">
      <div class="panel-title">
        <i class="fa fa-magnifying-glass-chart me-2 text-cyan"></i>SIEM — 이벤트 검색·분석
        <span class="badge bg-dark border border-secondary ms-2" style="font-weight:400;font-size:10px">Search &amp; Reporting</span>
        <button class="btn btn-xs btn-outline-cyan ms-auto" onclick="loadSiem()">
          <i class="fa fa-sync me-1"></i>새로고침
        </button>
      </div>

      <!-- 검색 바 (Splunk SPL 스타일) -->
      <div class="spl-searchbar">
        <span class="spl-prompt">&gt;</span>
        <input type="text" id="siem-search" class="spl-search-input"
               placeholder='검색: ip, 요청, 분류, source (예: /.env  또는  185.220  또는  suspicious)'
               oninput="renderSiemEvents()" onkeydown="if(event.key==='Enter')renderSiemEvents()">
        <select id="siem-timerange" class="spl-timerange" onchange="renderSiemEvents()">
          <option value="0">전체 시간</option>
          <option value="5">최근 5분</option>
          <option value="15">최근 15분</option>
          <option value="60">최근 1시간</option>
        </select>
        <button class="spl-search-btn" onclick="renderSiemEvents()"><i class="fa fa-magnifying-glass"></i></button>
      </div>

      <!-- 결과 요약 라인 -->
      <div class="spl-resultbar">
        <span id="siem-result-count"><b>0</b> 이벤트</span>
        <span class="spl-sep">·</span>
        <span class="text-danger"><b id="siem-suspicious">0</b> 의심</span>
        <span class="spl-sep">·</span>
        <span><b id="siem-unique-ips">0</b> 출발지 IP</span>
        <span class="spl-sep">·</span>
        <span><b id="siem-sources-ok">0</b> 소스 연결</span>
        <div class="ms-auto form-check form-switch small">
          <input class="form-check-input" type="checkbox" id="siem-suspicious-only" onchange="renderSiemEvents()">
          <label class="form-check-label small" for="siem-suspicious-only">의심만</label>
        </div>
      </div>

      <!-- 타임라인 히스토그램 -->
      <div class="spl-timeline-card">
        <div class="spl-timeline-head">
          <i class="fa fa-chart-column text-cyan me-1"></i>타임라인 <span class="text-muted">(분당 이벤트 수 · 빨강=의심)</span>
        </div>
        <svg id="siem-timeline" width="100%" height="110"></svg>
      </div>

      <div class="row g-3 mt-1">
        <!-- 필드 사이드바 (Splunk Fields) -->
        <div class="col-lg-3">
          <div class="spl-fields">
            <div class="spl-fields-head">FIELDS</div>
            <div id="siem-fields"><div class="text-muted p-2 small">로딩 중...</div></div>
          </div>
        </div>

        <!-- 이벤트 스트림 (raw events) -->
        <div class="col-lg-9">
          <div class="spl-events">
            <div class="spl-events-head">
              <span><i class="fa fa-list text-cyan me-1"></i>이벤트</span>
              <span class="ms-auto small text-muted">행 클릭 시 필드 펼치기</span>
            </div>
            <div id="siem-events" class="spl-events-body">
              <div class="text-muted p-3 text-center small">로딩 중...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
