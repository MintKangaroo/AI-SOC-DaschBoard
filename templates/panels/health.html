    <!-- ════ 모듈 헬스 패널 ════ -->
    <div id="panel-health" class="panel-section d-none">
      <div class="panel-title">
        <i class="fa fa-heart-pulse me-2 text-success"></i>모듈 헬스 — 가동 상태 · 동작 모드
        <span class="badge ms-2" id="health-demo-badge" style="background:#30363d">-</span>
        <label class="form-check form-switch small ms-3 mb-0 d-flex align-items-center gap-1" title="10초마다 자동 갱신">
          <input class="form-check-input" type="checkbox" id="health-auto" checked>
          <span class="text-muted">자동 갱신</span>
        </label>
        <button class="btn btn-xs btn-outline-cyan ms-auto" onclick="loadHealth()">
          <i class="fa fa-sync me-1"></i>새로고침
        </button>
      </div>

      <!-- 가이드 -->
      <div class="card-panel mb-3" style="border-left:3px solid var(--green); background:rgba(63,185,80,.05);">
        <div class="card-panel-header" style="border:none; padding-bottom:4px;">
          <i class="fa fa-lightbulb text-success me-2"></i>이 패널은 어떻게 봐야 할까?
        </div>
        <div class="small" style="color:#e6edf3; line-height:1.7">
          관제에 투입된 전 모듈의 <strong>가동 여부</strong>와 <strong>동작 모드</strong>를 한눈에 봅니다.
          <span class="badge bg-success">실측</span> 실제 데이터/외부 API,
          <span class="badge" style="background:var(--cyan);color:#001417">상시</span> 항상 실동작하는 처리 모듈,
          <span class="badge bg-warning text-dark">데모</span> 합성 데이터(실환경 미연동),
          <span class="badge bg-secondary">비활성</span> 미설정으로 미동작,
          <span class="badge bg-danger">중단</span> 기동 실패/정지.
          데모로 표시된 모듈은 <code>.env</code>의 <code>DEMO_MODE=False</code> 또는 개별 연동 설정으로 실측 전환됩니다.
        </div>
      </div>

      <!-- 요약 타일 -->
      <div class="row g-2 mb-3" id="health-summary">
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold" id="hs-total">-</div><div class="small text-muted">전체 모듈</div></div></div>
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold text-success" id="hs-running">-</div><div class="small text-muted">가동</div></div></div>
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold text-success" id="hs-real">-</div><div class="small text-muted">실측</div></div></div>
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold text-warning" id="hs-demo">-</div><div class="small text-muted">데모</div></div></div>
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold text-secondary" id="hs-off">-</div><div class="small text-muted">비활성</div></div></div>
        <div class="col"><div class="card-panel text-center py-2"><div class="fs-4 fw-bold text-danger" id="hs-down">-</div><div class="small text-muted">중단</div></div></div>
      </div>

      <!-- 카테고리별 모듈 목록 (JS 렌더) -->
      <div id="health-groups"></div>
    </div>
