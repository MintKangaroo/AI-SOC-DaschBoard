    <!-- ════ 알림 이력 검색 패널 ════ -->
    <div id="panel-alert-history" class="panel-section d-none">
      <div class="panel-title">
        <i class="fa fa-clock-rotate-left me-2 text-cyan"></i>알림 이력 검색
        <span class="badge bg-dark ms-2" id="ah-total-badge">-</span>
        <button class="btn btn-xs btn-outline-cyan ms-auto" onclick="exportAlertHistory()">
          <i class="fa fa-file-csv me-1"></i>CSV 내보내기
        </button>
      </div>

      <!-- 가이드 -->
      <div class="card-panel mb-3" style="border-left:3px solid var(--cyan); background:rgba(57,208,216,.05);">
        <div class="card-panel-header" style="border:none; padding-bottom:4px;">
          <i class="fa fa-lightbulb text-cyan me-2"></i>이 패널은 어떻게 봐야 할까?
        </div>
        <div class="small" style="color:#e6edf3; line-height:1.7">
          실시간 <strong>위협 알림</strong> 패널이 최근 알림만 보여주는 반면, 여기서는 <strong>DB에 저장된 전체 알림 이력</strong>을 기간·심각도·상태·유형·IP·본문으로 검색합니다.
          사후 조사(특정 IP가 언제부터 공격했는지, 지난주 CRITICAL 추이 등)와 보고서용 <strong>CSV 내보내기</strong>에 사용하세요.
        </div>
      </div>

      <!-- 검색 필터 -->
      <div class="card-panel mb-3">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">시작일</label>
            <input type="date" id="ah-from" class="form-control form-control-sm bg-dark text-white border-secondary">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">종료일</label>
            <input type="date" id="ah-to" class="form-control form-control-sm bg-dark text-white border-secondary">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">심각도</label>
            <select id="ah-severity" class="form-select form-select-sm bg-dark text-white border-secondary">
              <option value="">전체</option>
              <option value="CRITICAL">CRITICAL</option>
              <option value="HIGH">HIGH</option>
              <option value="MEDIUM">MEDIUM</option>
              <option value="LOW">LOW</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">상태</label>
            <select id="ah-status" class="form-select form-select-sm bg-dark text-white border-secondary">
              <option value="">전체</option>
              <option value="OPEN">OPEN</option>
              <option value="ACK">확인됨(ACK)</option>
              <option value="CLOSED">종료(CLOSED)</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">위협 유형</label>
            <select id="ah-type" class="form-select form-select-sm bg-dark text-white border-secondary">
              <option value="">전체</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label small text-muted mb-1">IP (출발/목적)</label>
            <input type="text" id="ah-ip" placeholder="예: 185.220" class="form-control form-control-sm bg-dark text-white border-secondary">
          </div>
          <div class="col-12 col-md-8">
            <label class="form-label small text-muted mb-1">본문 검색</label>
            <input type="text" id="ah-text" placeholder="설명에 포함된 단어" class="form-control form-control-sm bg-dark text-white border-secondary">
          </div>
          <div class="col-12 col-md-4 d-flex gap-2">
            <button class="btn btn-sm btn-cyan flex-fill" onclick="searchAlertHistory(1)">
              <i class="fa fa-magnifying-glass me-1"></i>검색
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="resetAlertHistory()">
              <i class="fa fa-rotate-left me-1"></i>초기화
            </button>
          </div>
        </div>
      </div>

      <!-- 결과 테이블 -->
      <div class="card-panel p-0">
        <table class="table table-dark table-hover table-sm mb-0">
          <thead>
            <tr>
              <th>시각</th><th>심각도</th><th>유형</th><th>출발지</th><th>목적지</th><th>설명</th><th>상태</th>
            </tr>
          </thead>
          <tbody id="ah-tbody">
            <tr><td colspan="7" class="text-center text-muted py-4">검색 조건을 선택하고 검색하세요.</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="d-flex align-items-center justify-content-between mt-2 small">
        <span class="text-muted" id="ah-summary"></span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-xs btn-outline-secondary" id="ah-prev" onclick="pageAlertHistory(-1)" disabled>
            <i class="fa fa-chevron-left"></i>
          </button>
          <span id="ah-page-label" class="text-muted">-</span>
          <button class="btn btn-xs btn-outline-secondary" id="ah-next" onclick="pageAlertHistory(1)" disabled>
            <i class="fa fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
